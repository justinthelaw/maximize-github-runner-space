    - name: Parallel File System Cleanup
      shell: bash
      run: |
        set -euo pipefail
        source /tmp/component_flags.env
        source /tmp/progress.sh

        echo "=== Starting Parallel File System Cleanup ==="
        PIDS=()

        safe_rm() {
          local target="$1"
          if [[ -n "$target" && "$target" != "/" ]]; then
            sudo rm -rf "$target" 2>/dev/null || true
          fi
        }

        if [[ "$COMPONENT_DOTNET" == "true" ]]; then
          {
            echo "Removing .NET runtime and libraries..."
            safe_rm /usr/share/dotnet
            safe_rm /usr/lib/dotnet
            safe_rm /etc/dotnet
            safe_rm /home/runner/.dotnet
            if [[ -n "${TOOLCACHE_DIR:-}" && "${TOOLCACHE_DIR}" != "/" ]]; then
              safe_rm "${TOOLCACHE_DIR}/dotnet"
            fi
            update_progress ".NET removal" "completed"
          } &
          PIDS+=($!)
        fi

        if [[ "$COMPONENT_ANDROID" == "true" ]]; then
          {
            echo "Removing Android SDKs and tools..."
            safe_rm /usr/local/lib/android
            safe_rm /usr/local/share/android
            safe_rm /opt/android
            safe_rm /opt/android-sdk
            safe_rm /home/runner/.android
            safe_rm /home/runner/.gradle
            update_progress "Android removal" "completed"
          } &
          PIDS+=($!)
        fi

        if [[ "$COMPONENT_HASKELL" == "true" ]]; then
          {
            echo "Removing Haskell artifacts..."
            safe_rm /opt/ghc
            safe_rm /usr/local/.ghcup
            if [[ -n "${TOOLCACHE_DIR:-}" && "${TOOLCACHE_DIR}" != "/" ]]; then
              safe_rm "${TOOLCACHE_DIR}/ghc"
            fi
            update_progress "Haskell removal" "completed"
