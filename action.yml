        if [[ "$COMPONENT_CACHED_RUBY" == "true" ]]; then
          {
            echo "Removing Ruby toolcache..."
            if [[ -n "${TOOLCACHE_DIR:-}" && "${TOOLCACHE_DIR}" != "/" ]]; then
              safe_rm "${TOOLCACHE_DIR}/Ruby"
              safe_rm "${TOOLCACHE_DIR}/ruby"
            fi
            update_progress "Ruby toolcache removal" "completed"
          } &
          PIDS+=($!)
        fi

        if [[ "$COMPONENT_RUST" == "true" ]]; then
          {
            echo "Removing Rust toolchain..."
            safe_rm /usr/local/rustup
            safe_rm /usr/local/cargo
            safe_rm /home/runner/.cargo
            safe_rm /home/runner/.rustup
            sudo rm -f /usr/local/bin/rustc /usr/local/bin/cargo /usr/local/bin/rustup 2>/dev/null || true
            update_progress "Rust removal" "completed"
