          PIDS+=($!)
        fi

        if [[ "$COMPONENT_SWAPFILE" == "true" ]]; then
          {
            humanize_bytes() {
              numfmt --to=iec --suffix=B "$1"
            }

            disable_managed_swapfile() {
              if swapon --show=NAME --noheadings 2>/dev/null | awk '{print $1}' | grep -Fxq '/mnt/swapfile'; then
                sudo swapoff /mnt/swapfile 2>/dev/null || true
              fi
            }

            remove_managed_swapfile() {
              disable_managed_swapfile
              sudo sed -i '\|^/mnt/swapfile[[:space:]]\+none[[:space:]]\+swap[[:space:]]|d' /etc/fstab 2>/dev/null || true
              sudo rm -f /mnt/swapfile 2>/dev/null || true
            }

            select_swapfile_size() {
              local requested_bytes="$1"
              local existing_bytes=0
              local available_bytes reserve_bytes max_target_bytes

              if [[ -f /mnt/swapfile ]]; then
                existing_bytes=$(stat -c %s /mnt/swapfile 2>/dev/null || echo 0)
              fi

              available_bytes=$(df --output=avail -B1 /mnt | tail -n1 | tr -d '[:space:]')
              reserve_bytes=$((512 * 1024 * 1024))
              max_target_bytes=$((available_bytes + existing_bytes - reserve_bytes))
              if (( max_target_bytes < 0 )); then
                max_target_bytes=0
              fi

              if (( requested_bytes <= max_target_bytes )); then
                echo "$requested_bytes"
                return 0
              fi

              echo "::error::Requested swapfile-size $(humanize_bytes "$requested_bytes") exceeds the safe free space available on /mnt. Existing swapfile left unchanged." >&2
              return 1
            }

            create_swapfile() {
              local target_bytes="$1"
              local mib_count remainder_bytes

              remove_managed_swapfile

              echo "Creating swapfile at /mnt/swapfile with size $(humanize_bytes "$target_bytes")..."
              if ! sudo fallocate -l "$target_bytes" /mnt/swapfile 2>/dev/null; then
                mib_count=$((target_bytes / 1024 / 1024))
                if (( mib_count > 0 )); then
                  sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count="$mib_count" status=none
                else
                  sudo dd if=/dev/zero of=/mnt/swapfile bs=1 count=0 status=none
                fi
                remainder_bytes=$((target_bytes - mib_count * 1024 * 1024))
                if (( remainder_bytes > 0 )); then
                  sudo dd if=/dev/zero of=/mnt/swapfile bs=1 count="$remainder_bytes" seek=$((mib_count * 1024 * 1024)) conv=notrunc status=none
                fi
              fi

              sudo chmod 600 /mnt/swapfile
              sudo mkswap /mnt/swapfile >/dev/null
              sudo swapon /mnt/swapfile
              if ! grep -Eq '^/mnt/swapfile[[:space:]]+none[[:space:]]+swap[[:space:]]' /etc/fstab; then
                echo '/mnt/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab >/dev/null
              fi
            }

            if [[ "$SWAPFILE_MODE" == "remove" ]]; then
              echo "Removing swapfile..."
              remove_managed_swapfile
              update_progress "Swapfile management" "removed"
            elif [[ "$SWAPFILE_MODE" == "ensure" ]]; then
              selected_swapfile_size=$(select_swapfile_size "$SWAPFILE_DESIRED_BYTES")
              create_swapfile "$selected_swapfile_size"
              update_progress "Swapfile management" "configured"
            else
              update_progress "Swapfile management" "skipped"
            fi

            echo "Updated memory status:"
            free -h
          } &
          PIDS+=($!)
        fi

        for pid in "${PIDS[@]}"; do
          wait "$pid"
        done

        if [[ "$COMPONENT_DOCKER_ENGINE" == "true" ]]; then
          echo "Removing Docker Engine..."
          sudo systemctl stop docker 2>/dev/null || true
          sudo systemctl stop containerd 2>/dev/null || true
          sudo apt-get purge -y docker-ce docker-ce-cli containerd.io \
            docker-buildx-plugin docker-compose-plugin moby-engine moby-cli \
            2>/dev/null || true
          sudo rm -f /usr/bin/docker /usr/local/bin/docker 2>/dev/null || true
          safe_rm /var/lib/docker
          safe_rm /var/lib/containerd
          safe_rm /etc/docker
          safe_rm /usr/lib/docker
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean 2>/dev/null || true
          update_progress "Docker Engine removal" "completed"
        fi

        echo "System cleanup phase completed"
        echo

    - name: Cleanup Summary
      shell: bash
      run: |
        set -euo pipefail

        completed=$(cat /tmp/completed_ops 2>/dev/null || echo "0")
        total=$(cat /tmp/total_ops 2>/dev/null || echo "0")

        echo "=== Cleanup Summary ==="
        echo "All operations completed: $completed/$total"
        echo "Timestamp: $(date)"
        echo

        rm -f /tmp/component_flags.env /tmp/progress.sh
        rm -f /tmp/total_ops /tmp/completed_ops /tmp/completed_ops.lock

    - name: Disk Space Report (AFTER)
      shell: bash
      run: |
        set -euo pipefail
        echo "Available storage:"
        sudo df -h
        echo
