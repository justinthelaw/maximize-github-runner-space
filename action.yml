name: "Maximize GitHub Runner Space"
description: "Maximize the available disk space for your test and/or build job"
branding:
  icon: "crop"
  color: "blue"

inputs:
  cleanup-profile:
    description: "Cleanup mode: custom (use remove-* flags) or max (enable all components except those in skip-components)"
    required: false
    default: "max"
  skip-components:
    description: "Comma-separated components to skip when cleanup-profile=max (e.g. dotnet,android,swift)"
    required: false
    default: ""

  # Core package removal actions
  remove-dotnet:
    description: "Removes .NET runtime and libraries. (frees ~2 GB)"
    required: false
    default: "false"
  remove-android:
    description: "Removes Android SDKs and tools. (frees ~9 GB)"
    required: false
    default: "false"
  remove-haskell:
    description: "Removes GHC (Haskell) artifacts. (frees ~5 GB)"
    required: false
    default: "false"
  remove-codeql:
    description: "Removes CodeQL Action bundles. (frees ~5 GB)"
    required: false
    default: "false"
  remove-cached-tools:
    description: "Removes cached setup-action tools. (frees ~8 GB)"
    required: false
    default: "false"
  swapfile-size:
    description: "Optional swapfile size. Accepts 0, 1.5GiB, 512MiB, or a plain GiB value like 2. Leaves the runner swapfile untouched when omitted."
    required: false
    default: ""

  # Additional high-impact removals
  remove-swift:
    description: "Removes Swift toolchain files. (frees ~2-3 GB)"
    required: false
    default: "false"
  remove-julia:
    description: "Removes Julia binaries and libraries. (frees ~1 GB)"
    required: false
    default: "false"
  remove-java:
    description: "Purges OpenJDK packages. (frees ~1-2 GB)"
    required: false
    default: "false"
  remove-browsers:
    description: "Purges major browsers and webdriver packages. (frees ~1+ GB)"
    required: false
    default: "false"
  remove-powershell:
    description: "Purges PowerShell package."
    required: false
    default: "false"
  remove-miniconda:
    description: "Removes Miniconda installation."
    required: false
    default: "false"
  remove-homebrew:
    description: "Removes Homebrew (Linuxbrew) files."
    required: false
    default: "false"
  remove-vcpkg:
    description: "Removes vcpkg installation."
    required: false
    default: "false"

  # Cached toolcache subsets (useful when you want partial toolcache cleanup)
  remove-cached-go:
    description: "Removes Go toolcache entries."
    required: false
    default: "false"
  remove-cached-node:
    description: "Removes Node.js toolcache entries."
    required: false
    default: "false"
  remove-cached-python:
    description: "Removes Python toolcache entries."
    required: false
    default: "false"
  remove-cached-pypy:
    description: "Removes PyPy toolcache entries."
    required: false
    default: "false"
  remove-cached-ruby:
    description: "Removes Ruby toolcache entries."
    required: false
    default: "false"

  # Browser and webdriver subsets (for granular control)
  remove-chrome:
    description: "Purges Google Chrome."
    required: false
    default: "false"
  remove-chromium:
    description: "Purges Chromium browser."
    required: false
    default: "false"
  remove-edge:
    description: "Purges Microsoft Edge."
    required: false
    default: "false"
  remove-firefox:
    description: "Purges Firefox."
    required: false
    default: "false"
  remove-webdrivers:
    description: "Removes browser webdrivers (chromedriver, geckodriver, edgedriver)."
    required: false
    default: "false"
  remove-selenium:
    description: "Removes Selenium server artifacts."
    required: false
    default: "false"

  # Cloud/CLI tools
  remove-aws-cli:
    description: "Removes AWS CLI v2."
    required: false
    default: "false"
  remove-aws-sam-cli:
    description: "Removes AWS SAM CLI."
    required: false
    default: "false"
  remove-azure-cli:
    description: "Removes Azure CLI."
    required: false
    default: "false"
  remove-gh-cli:
    description: "Removes GitHub CLI."
    required: false
    default: "false"
  remove-gcloud-cli:
    description: "Removes Google Cloud CLI/SDK."
    required: false
    default: "false"
  remove-azcopy:
    description: "Removes AzCopy."
    required: false
    default: "false"

  # Kubernetes and DevOps tools
  remove-kubectl:
    description: "Removes kubectl."
    required: false
    default: "false"
  remove-helm:
    description: "Removes Helm."
    required: false
    default: "false"
  remove-kind:
    description: "Removes kind."
    required: false
    default: "false"
  remove-minikube:
    description: "Removes Minikube."
    required: false
    default: "false"
  remove-kustomize:
    description: "Removes Kustomize."
    required: false
    default: "false"

  # Container tooling (beyond cached images)
  remove-docker-engine:
    description: "Purges Docker Engine packages and data directories."
    required: false
    default: "false"
  remove-buildah:
    description: "Removes Buildah."
    required: false
    default: "false"
  remove-podman:
    description: "Removes Podman."
    required: false
    default: "false"

  # Project/build tools
  remove-maven:
    description: "Removes Apache Maven."
    required: false
    default: "false"
  remove-gradle:
    description: "Removes Gradle."
    required: false
    default: "false"
  remove-ant:
    description: "Removes Apache Ant."
    required: false
    default: "false"

  # Language-specific tooling
  remove-php:
    description: "Removes PHP and common PHP tooling (composer/phpunit)."
    required: false
    default: "false"
  remove-rust:
    description: "Removes Rust toolchain (rustup/cargo)."
    required: false
    default: "false"

  # Services and databases
  remove-postgresql:
    description: "Purges PostgreSQL packages and data."
    required: false
    default: "false"
  remove-mysql:
    description: "Purges MySQL/MariaDB packages and data."
    required: false
    default: "false"
  remove-apache:
    description: "Purges Apache HTTP Server."
    required: false
    default: "false"
  remove-nginx:
    description: "Purges Nginx."
    required: false
    default: "false"

  # Existing optional cleanups
  remove-docker-images:
    description: "Removes cached Docker images. (frees ~3 GB)"
    required: false
    default: "false"
  remove-large-packages:
    description: "Purges additional large apt packages. (frees ~3 GB)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Disk Space Report (BEFORE)
      shell: bash
      run: |
        set -euo pipefail
        echo "Available storage:"
        sudo df -h
        echo

    - name: Initialize Cleanup Plan
      shell: bash
      env:
        CLEANUP_PROFILE: ${{ inputs.cleanup-profile }}
        SKIP_COMPONENTS: ${{ inputs.skip-components }}
        REMOVE_DOTNET: ${{ inputs.remove-dotnet }}
        REMOVE_ANDROID: ${{ inputs.remove-android }}
        REMOVE_HASKELL: ${{ inputs.remove-haskell }}
        REMOVE_CODEQL: ${{ inputs.remove-codeql }}
        REMOVE_CACHED_TOOLS: ${{ inputs.remove-cached-tools }}
        SWAPFILE_SIZE: ${{ inputs.swapfile-size }}
        REMOVE_SWIFT: ${{ inputs.remove-swift }}
        REMOVE_JULIA: ${{ inputs.remove-julia }}
        REMOVE_JAVA: ${{ inputs.remove-java }}
        REMOVE_BROWSERS: ${{ inputs.remove-browsers }}
        REMOVE_POWERSHELL: ${{ inputs.remove-powershell }}
        REMOVE_MINICONDA: ${{ inputs.remove-miniconda }}
        REMOVE_HOMEBREW: ${{ inputs.remove-homebrew }}
        REMOVE_VCPKG: ${{ inputs.remove-vcpkg }}
        REMOVE_CACHED_GO: ${{ inputs.remove-cached-go }}
        REMOVE_CACHED_NODE: ${{ inputs.remove-cached-node }}
        REMOVE_CACHED_PYTHON: ${{ inputs.remove-cached-python }}
        REMOVE_CACHED_PYPY: ${{ inputs.remove-cached-pypy }}
        REMOVE_CACHED_RUBY: ${{ inputs.remove-cached-ruby }}
        REMOVE_CHROME: ${{ inputs.remove-chrome }}
        REMOVE_CHROMIUM: ${{ inputs.remove-chromium }}
        REMOVE_EDGE: ${{ inputs.remove-edge }}
        REMOVE_FIREFOX: ${{ inputs.remove-firefox }}
        REMOVE_WEBDRIVERS: ${{ inputs.remove-webdrivers }}
        REMOVE_SELENIUM: ${{ inputs.remove-selenium }}
        REMOVE_AWS_CLI: ${{ inputs.remove-aws-cli }}
        REMOVE_AWS_SAM_CLI: ${{ inputs.remove-aws-sam-cli }}
        REMOVE_AZURE_CLI: ${{ inputs.remove-azure-cli }}
        REMOVE_GH_CLI: ${{ inputs.remove-gh-cli }}
        REMOVE_GCLOUD_CLI: ${{ inputs.remove-gcloud-cli }}
        REMOVE_AZCOPY: ${{ inputs.remove-azcopy }}
        REMOVE_KUBECTL: ${{ inputs.remove-kubectl }}
        REMOVE_HELM: ${{ inputs.remove-helm }}
        REMOVE_KIND: ${{ inputs.remove-kind }}
        REMOVE_MINIKUBE: ${{ inputs.remove-minikube }}
        REMOVE_KUSTOMIZE: ${{ inputs.remove-kustomize }}
        REMOVE_DOCKER_ENGINE: ${{ inputs.remove-docker-engine }}
        REMOVE_BUILDAH: ${{ inputs.remove-buildah }}
        REMOVE_PODMAN: ${{ inputs.remove-podman }}
        REMOVE_MAVEN: ${{ inputs.remove-maven }}
        REMOVE_GRADLE: ${{ inputs.remove-gradle }}
        REMOVE_ANT: ${{ inputs.remove-ant }}
        REMOVE_PHP: ${{ inputs.remove-php }}
        REMOVE_RUST: ${{ inputs.remove-rust }}
        REMOVE_POSTGRESQL: ${{ inputs.remove-postgresql }}
        REMOVE_MYSQL: ${{ inputs.remove-mysql }}
        REMOVE_APACHE: ${{ inputs.remove-apache }}
        REMOVE_NGINX: ${{ inputs.remove-nginx }}
        REMOVE_DOCKER_IMAGES: ${{ inputs.remove-docker-images }}
        REMOVE_LARGE_PACKAGES: ${{ inputs.remove-large-packages }}
      run: |
        set -euo pipefail

        normalize_csv() {
          echo "$1" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]'
        }

        csv_contains() {
          local csv="$1"
          local item="$2"
          [[ ",${csv}," == *",${item},"* ]]
        }

        parse_swapfile_size_bytes() {
          local raw="${1:-}"

          python3 -c $'import re\nimport sys\nfrom decimal import Decimal, InvalidOperation, ROUND_HALF_UP\n\nraw = sys.argv[1].strip()\nmatch = re.fullmatch(r"([0-9]+(?:\\.[0-9]+)?)([kmgt]i?b?)?", raw, re.IGNORECASE)\nif not match:\n    raise SystemExit(1)\n\ntry:\n    value = Decimal(match.group(1))\nexcept InvalidOperation:\n    raise SystemExit(1)\n\nif value < 0:\n    raise SystemExit(1)\n\nunit = (match.group(2) or "gib").lower()\nmultipliers = {\n    "k": 1024,\n    "kb": 1024,\n    "ki": 1024,\n    "kib": 1024,\n    "m": 1024 ** 2,\n    "mb": 1024 ** 2,\n    "mi": 1024 ** 2,\n    "mib": 1024 ** 2,\n    "g": 1024 ** 3,\n    "gb": 1024 ** 3,\n    "gi": 1024 ** 3,\n    "gib": 1024 ** 3,\n    "t": 1024 ** 4,\n    "tb": 1024 ** 4,\n    "ti": 1024 ** 4,\n    "tib": 1024 ** 4,\n}\n\nbytes_value = (value * multipliers[unit]).to_integral_value(rounding=ROUND_HALF_UP)\nprint(int(bytes_value))' "$raw"
        }

        should_enable() {
          local component="$1"
          local custom_value="$2"
          local group="${3:-}"

          if [[ "${CLEANUP_PROFILE}" == "max" ]]; then
            if csv_contains "$SKIP_COMPONENTS_NORMALIZED" "$component"; then
              echo "false"
            elif [[ -n "$group" ]] && csv_contains "$SKIP_COMPONENTS_NORMALIZED" "$group"; then
              echo "false"
            else
              echo "true"
            fi
            return
          fi

          if [[ "${custom_value}" == "true" ]]; then
            echo "true"
          else
            echo "false"
          fi
        }

        SKIP_COMPONENTS_NORMALIZED=$(normalize_csv "${SKIP_COMPONENTS}")

        echo "=== GitHub Runner Space Maximization Started ==="
        echo "Timestamp: $(date)"
        echo "Cleanup profile: ${CLEANUP_PROFILE}"
        if [[ -n "${SKIP_COMPONENTS_NORMALIZED}" ]]; then
          echo "Skip components: ${SKIP_COMPONENTS_NORMALIZED}"
        fi
        echo

        COMPONENT_DOTNET=$(should_enable "dotnet" "${REMOVE_DOTNET}")
        COMPONENT_ANDROID=$(should_enable "android" "${REMOVE_ANDROID}")
        COMPONENT_HASKELL=$(should_enable "haskell" "${REMOVE_HASKELL}")
        COMPONENT_CODEQL=$(should_enable "codeql" "${REMOVE_CODEQL}")
        COMPONENT_SWAPFILE="false"
        SWAPFILE_MODE="keep"
        SWAPFILE_SIZE_INPUT_NORMALIZED=$(echo "${SWAPFILE_SIZE}" | tr -d '[:space:]')
        SWAPFILE_DESIRED_BYTES=""
        if [[ -n "${SWAPFILE_SIZE_INPUT_NORMALIZED}" ]]; then
          SWAPFILE_DESIRED_BYTES=$(parse_swapfile_size_bytes "${SWAPFILE_SIZE_INPUT_NORMALIZED}") || {
            echo "::error::Invalid swapfile-size '${SWAPFILE_SIZE}'. Use values like 0, 1.5GiB, 512MiB, or 2."
            exit 1
          }
          COMPONENT_SWAPFILE="true"
          if [[ "${SWAPFILE_DESIRED_BYTES}" == "0" ]]; then
            SWAPFILE_MODE="remove"
          else
            SWAPFILE_MODE="ensure"
          fi
        fi
        COMPONENT_SWIFT=$(should_enable "swift" "${REMOVE_SWIFT}")
        COMPONENT_JULIA=$(should_enable "julia" "${REMOVE_JULIA}")
        COMPONENT_JAVA=$(should_enable "java" "${REMOVE_JAVA}")
        COMPONENT_POWERSHELL=$(should_enable "powershell" "${REMOVE_POWERSHELL}")
        COMPONENT_MINICONDA=$(should_enable "miniconda" "${REMOVE_MINICONDA}")
        COMPONENT_HOMEBREW=$(should_enable "homebrew" "${REMOVE_HOMEBREW}")
        COMPONENT_VCPKG=$(should_enable "vcpkg" "${REMOVE_VCPKG}")
        if [[ "${CLEANUP_PROFILE}" == "max" ]]; then
          if csv_contains "$SKIP_COMPONENTS_NORMALIZED" "cached-tools" || \
             csv_contains "$SKIP_COMPONENTS_NORMALIZED" "cached-go" || \
             csv_contains "$SKIP_COMPONENTS_NORMALIZED" "cached-node" || \
             csv_contains "$SKIP_COMPONENTS_NORMALIZED" "cached-python" || \
             csv_contains "$SKIP_COMPONENTS_NORMALIZED" "cached-pypy" || \
             csv_contains "$SKIP_COMPONENTS_NORMALIZED" "cached-ruby"; then
            COMPONENT_CACHED_TOOLS="false"
          else
            COMPONENT_CACHED_TOOLS="true"
          fi
        else
          COMPONENT_CACHED_TOOLS=$(should_enable "cached-tools" "${REMOVE_CACHED_TOOLS}")
        fi
        if [[ "${CLEANUP_PROFILE}" == "max" ]]; then
          if csv_contains "$SKIP_COMPONENTS_NORMALIZED" "browsers" || \
             csv_contains "$SKIP_COMPONENTS_NORMALIZED" "chrome" || \
             csv_contains "$SKIP_COMPONENTS_NORMALIZED" "chromium" || \
             csv_contains "$SKIP_COMPONENTS_NORMALIZED" "edge" || \
             csv_contains "$SKIP_COMPONENTS_NORMALIZED" "firefox" || \
             csv_contains "$SKIP_COMPONENTS_NORMALIZED" "webdrivers" || \
             csv_contains "$SKIP_COMPONENTS_NORMALIZED" "selenium"; then
            COMPONENT_BROWSERS="false"
          else
            COMPONENT_BROWSERS="true"
          fi
        else
          COMPONENT_BROWSERS=$(should_enable "browsers" "${REMOVE_BROWSERS}")
        fi
        COMPONENT_CACHED_GO=$(should_enable "cached-go" "${REMOVE_CACHED_GO}" "cached-tools")
        COMPONENT_CACHED_NODE=$(should_enable "cached-node" "${REMOVE_CACHED_NODE}" "cached-tools")
        COMPONENT_CACHED_PYTHON=$(should_enable "cached-python" "${REMOVE_CACHED_PYTHON}" "cached-tools")
        COMPONENT_CACHED_PYPY=$(should_enable "cached-pypy" "${REMOVE_CACHED_PYPY}" "cached-tools")
        COMPONENT_CACHED_RUBY=$(should_enable "cached-ruby" "${REMOVE_CACHED_RUBY}" "cached-tools")
        COMPONENT_CHROME=$(should_enable "chrome" "${REMOVE_CHROME}" "browsers")
        COMPONENT_CHROMIUM=$(should_enable "chromium" "${REMOVE_CHROMIUM}" "browsers")
        COMPONENT_EDGE=$(should_enable "edge" "${REMOVE_EDGE}" "browsers")
        COMPONENT_FIREFOX=$(should_enable "firefox" "${REMOVE_FIREFOX}" "browsers")
        COMPONENT_WEBDRIVERS=$(should_enable "webdrivers" "${REMOVE_WEBDRIVERS}" "browsers")
        COMPONENT_SELENIUM=$(should_enable "selenium" "${REMOVE_SELENIUM}" "browsers")
        COMPONENT_AWS_CLI=$(should_enable "aws-cli" "${REMOVE_AWS_CLI}")
        COMPONENT_AWS_SAM_CLI=$(should_enable "aws-sam-cli" "${REMOVE_AWS_SAM_CLI}")
        COMPONENT_AZURE_CLI=$(should_enable "azure-cli" "${REMOVE_AZURE_CLI}")
        COMPONENT_GH_CLI=$(should_enable "gh-cli" "${REMOVE_GH_CLI}")
        COMPONENT_GCLOUD_CLI=$(should_enable "gcloud-cli" "${REMOVE_GCLOUD_CLI}")
        COMPONENT_AZCOPY=$(should_enable "azcopy" "${REMOVE_AZCOPY}")
        COMPONENT_KUBECTL=$(should_enable "kubectl" "${REMOVE_KUBECTL}")
        COMPONENT_HELM=$(should_enable "helm" "${REMOVE_HELM}")
        COMPONENT_KIND=$(should_enable "kind" "${REMOVE_KIND}")
        COMPONENT_MINIKUBE=$(should_enable "minikube" "${REMOVE_MINIKUBE}")
        COMPONENT_KUSTOMIZE=$(should_enable "kustomize" "${REMOVE_KUSTOMIZE}")
        COMPONENT_DOCKER_ENGINE=$(should_enable "docker-engine" "${REMOVE_DOCKER_ENGINE}")
        COMPONENT_BUILDAH=$(should_enable "buildah" "${REMOVE_BUILDAH}")
        COMPONENT_PODMAN=$(should_enable "podman" "${REMOVE_PODMAN}")
        COMPONENT_MAVEN=$(should_enable "maven" "${REMOVE_MAVEN}")
        COMPONENT_GRADLE=$(should_enable "gradle" "${REMOVE_GRADLE}")
        COMPONENT_ANT=$(should_enable "ant" "${REMOVE_ANT}")
        COMPONENT_PHP=$(should_enable "php" "${REMOVE_PHP}")
        COMPONENT_RUST=$(should_enable "rust" "${REMOVE_RUST}")
        COMPONENT_POSTGRESQL=$(should_enable "postgresql" "${REMOVE_POSTGRESQL}")
        COMPONENT_MYSQL=$(should_enable "mysql" "${REMOVE_MYSQL}")
        COMPONENT_APACHE=$(should_enable "apache" "${REMOVE_APACHE}")
        COMPONENT_NGINX=$(should_enable "nginx" "${REMOVE_NGINX}")
        COMPONENT_DOCKER_IMAGES=$(should_enable "docker-images" "${REMOVE_DOCKER_IMAGES}")
        COMPONENT_LARGE_PACKAGES=$(should_enable "large-packages" "${REMOVE_LARGE_PACKAGES}")

        if [[ "$COMPONENT_CACHED_TOOLS" == "true" ]]; then
          COMPONENT_CACHED_GO="false"
          COMPONENT_CACHED_NODE="false"
          COMPONENT_CACHED_PYTHON="false"
          COMPONENT_CACHED_PYPY="false"
          COMPONENT_CACHED_RUBY="false"
        fi

        if [[ "$COMPONENT_BROWSERS" == "true" ]]; then
          COMPONENT_CHROME="false"
          COMPONENT_CHROMIUM="false"
          COMPONENT_EDGE="false"
          COMPONENT_FIREFOX="false"
          COMPONENT_WEBDRIVERS="false"
          COMPONENT_SELENIUM="false"
        fi

        TOOLCACHE_DIR="${RUNNER_TOOL_CACHE:-${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}}"
        if [[ -z "${TOOLCACHE_DIR}" || "${TOOLCACHE_DIR}" == "/" ]]; then
          TOOLCACHE_DIR="/opt/hostedtoolcache"
        fi

        cat > /tmp/component_flags.env <<FLAGS
        COMPONENT_DOTNET=${COMPONENT_DOTNET}
        COMPONENT_ANDROID=${COMPONENT_ANDROID}
        COMPONENT_HASKELL=${COMPONENT_HASKELL}
        COMPONENT_CODEQL=${COMPONENT_CODEQL}
        COMPONENT_CACHED_TOOLS=${COMPONENT_CACHED_TOOLS}
        COMPONENT_SWAPFILE=${COMPONENT_SWAPFILE}
        SWAPFILE_MODE=${SWAPFILE_MODE}
        SWAPFILE_DESIRED_BYTES=${SWAPFILE_DESIRED_BYTES}
        SWAPFILE_SIZE_INPUT_NORMALIZED=${SWAPFILE_SIZE_INPUT_NORMALIZED}
        COMPONENT_SWIFT=${COMPONENT_SWIFT}
        COMPONENT_JULIA=${COMPONENT_JULIA}
        COMPONENT_JAVA=${COMPONENT_JAVA}
        COMPONENT_BROWSERS=${COMPONENT_BROWSERS}
        COMPONENT_POWERSHELL=${COMPONENT_POWERSHELL}
        COMPONENT_MINICONDA=${COMPONENT_MINICONDA}
        COMPONENT_HOMEBREW=${COMPONENT_HOMEBREW}
        COMPONENT_VCPKG=${COMPONENT_VCPKG}
        COMPONENT_CACHED_GO=${COMPONENT_CACHED_GO}
        COMPONENT_CACHED_NODE=${COMPONENT_CACHED_NODE}
        COMPONENT_CACHED_PYTHON=${COMPONENT_CACHED_PYTHON}
        COMPONENT_CACHED_PYPY=${COMPONENT_CACHED_PYPY}
        COMPONENT_CACHED_RUBY=${COMPONENT_CACHED_RUBY}
        COMPONENT_CHROME=${COMPONENT_CHROME}
        COMPONENT_CHROMIUM=${COMPONENT_CHROMIUM}
        COMPONENT_EDGE=${COMPONENT_EDGE}
        COMPONENT_FIREFOX=${COMPONENT_FIREFOX}
        COMPONENT_WEBDRIVERS=${COMPONENT_WEBDRIVERS}
        COMPONENT_SELENIUM=${COMPONENT_SELENIUM}
        COMPONENT_AWS_CLI=${COMPONENT_AWS_CLI}
        COMPONENT_AWS_SAM_CLI=${COMPONENT_AWS_SAM_CLI}
        COMPONENT_AZURE_CLI=${COMPONENT_AZURE_CLI}
        COMPONENT_GH_CLI=${COMPONENT_GH_CLI}
        COMPONENT_GCLOUD_CLI=${COMPONENT_GCLOUD_CLI}
        COMPONENT_AZCOPY=${COMPONENT_AZCOPY}
        COMPONENT_KUBECTL=${COMPONENT_KUBECTL}
        COMPONENT_HELM=${COMPONENT_HELM}
        COMPONENT_KIND=${COMPONENT_KIND}
        COMPONENT_MINIKUBE=${COMPONENT_MINIKUBE}
        COMPONENT_KUSTOMIZE=${COMPONENT_KUSTOMIZE}
        COMPONENT_DOCKER_ENGINE=${COMPONENT_DOCKER_ENGINE}
        COMPONENT_BUILDAH=${COMPONENT_BUILDAH}
        COMPONENT_PODMAN=${COMPONENT_PODMAN}
        COMPONENT_MAVEN=${COMPONENT_MAVEN}
        COMPONENT_GRADLE=${COMPONENT_GRADLE}
        COMPONENT_ANT=${COMPONENT_ANT}
        COMPONENT_PHP=${COMPONENT_PHP}
        COMPONENT_RUST=${COMPONENT_RUST}
        COMPONENT_POSTGRESQL=${COMPONENT_POSTGRESQL}
        COMPONENT_MYSQL=${COMPONENT_MYSQL}
        COMPONENT_APACHE=${COMPONENT_APACHE}
        COMPONENT_NGINX=${COMPONENT_NGINX}
        COMPONENT_DOCKER_IMAGES=${COMPONENT_DOCKER_IMAGES}
        COMPONENT_LARGE_PACKAGES=${COMPONENT_LARGE_PACKAGES}
        TOOLCACHE_DIR=${TOOLCACHE_DIR}
        FLAGS

        TOTAL_OPS=0
        for flag in \
          "$COMPONENT_DOTNET" \
          "$COMPONENT_ANDROID" \
          "$COMPONENT_HASKELL" \
          "$COMPONENT_CODEQL" \
          "$COMPONENT_CACHED_TOOLS" \
          "$COMPONENT_SWAPFILE" \
          "$COMPONENT_SWIFT" \
          "$COMPONENT_JULIA" \
          "$COMPONENT_JAVA" \
          "$COMPONENT_BROWSERS" \
          "$COMPONENT_POWERSHELL" \
          "$COMPONENT_MINICONDA" \
          "$COMPONENT_HOMEBREW" \
          "$COMPONENT_VCPKG" \
          "$COMPONENT_CACHED_GO" \
          "$COMPONENT_CACHED_NODE" \
          "$COMPONENT_CACHED_PYTHON" \
          "$COMPONENT_CACHED_PYPY" \
          "$COMPONENT_CACHED_RUBY" \
          "$COMPONENT_CHROME" \
          "$COMPONENT_CHROMIUM" \
          "$COMPONENT_EDGE" \
          "$COMPONENT_FIREFOX" \
          "$COMPONENT_WEBDRIVERS" \
          "$COMPONENT_SELENIUM" \
          "$COMPONENT_AWS_CLI" \
          "$COMPONENT_AWS_SAM_CLI" \
          "$COMPONENT_AZURE_CLI" \
          "$COMPONENT_GH_CLI" \
          "$COMPONENT_GCLOUD_CLI" \
          "$COMPONENT_AZCOPY" \
          "$COMPONENT_KUBECTL" \
          "$COMPONENT_HELM" \
          "$COMPONENT_KIND" \
          "$COMPONENT_MINIKUBE" \
          "$COMPONENT_KUSTOMIZE" \
          "$COMPONENT_DOCKER_ENGINE" \
          "$COMPONENT_BUILDAH" \
          "$COMPONENT_PODMAN" \
          "$COMPONENT_MAVEN" \
          "$COMPONENT_GRADLE" \
          "$COMPONENT_ANT" \
          "$COMPONENT_PHP" \
          "$COMPONENT_RUST" \
          "$COMPONENT_POSTGRESQL" \
          "$COMPONENT_MYSQL" \
          "$COMPONENT_APACHE" \
          "$COMPONENT_NGINX" \
          "$COMPONENT_DOCKER_IMAGES" \
          "$COMPONENT_LARGE_PACKAGES"; do
          if [[ "$flag" == "true" ]]; then
            TOTAL_OPS=$((TOTAL_OPS + 1))
          fi
        done

        echo "$TOTAL_OPS" > /tmp/total_ops
        echo "0" > /tmp/completed_ops
        : > /tmp/completed_ops.lock

        cat > /tmp/progress.sh <<'PROGRESS'
        update_progress() {
          local operation="$1"
          local status="$2"
          local completed total percent

          exec 9>/tmp/completed_ops.lock
          flock -x 9
          completed=$(cat /tmp/completed_ops 2>/dev/null || echo "0")
          total=$(cat /tmp/total_ops 2>/dev/null || echo "0")
          completed=$((completed + 1))
          echo "$completed" > /tmp/completed_ops
          flock -u 9

          if [[ "$total" -gt 0 ]]; then
            percent=$((completed * 100 / total))
          else
            percent=100
          fi

          echo "[$percent%] $operation: $status ($(date))"
        }
        PROGRESS

        echo "Total operations to perform: $TOTAL_OPS"
        if [[ "$TOTAL_OPS" -eq 0 ]]; then
          echo "No cleanup options selected; this run will only report disk space."
        fi

        echo -n "Scheduled operations: "
        [[ "$COMPONENT_DOTNET" == "true" ]] && echo -n "dotnet "
        [[ "$COMPONENT_ANDROID" == "true" ]] && echo -n "android "
