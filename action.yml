    - name: Package Manager Cleanup
      shell: bash
      run: |
        set -euo pipefail
        source /tmp/component_flags.env
        source /tmp/progress.sh

        echo "=== Package Manager Cleanup ==="
        APT_DIRTY=0

        apt_purge() {
          sudo apt-get purge -y "$@" 2>/dev/null || true
          APT_DIRTY=1
        }

        safe_rm() {
          local target="$1"
          if [[ -n "$target" && "$target" != "/" ]]; then
            sudo rm -rf "$target" 2>/dev/null || true
          fi
        }

        remove_binary() {
          local name="$1"
          local path
          path=$(command -v "$name" 2>/dev/null || true)
          if [[ -n "$path" ]]; then
            sudo rm -f "$path" 2>/dev/null || true
          fi
        }

        if [[ "$COMPONENT_LARGE_PACKAGES" == "true" ]]; then
          echo "Removing large package groups..."
          apt_purge '^aspnetcore-.*' '^dotnet-.*'
          apt_purge '^llvm-.*' 'php.*'
          apt_purge '^mongodb-.*' '^mysql-.*'
          apt_purge azure-cli google-cloud-sdk google-cloud-cli \
            google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri \
            --fix-missing
          update_progress "Large packages removal" "completed"
        fi

        if [[ "$COMPONENT_JAVA" == "true" ]]; then
          echo "Removing Java/OpenJDK packages..."
          apt_purge '^openjdk-.*'
          # Runner images also ship Temurin toolchains outside apt packages.
          safe_rm /usr/lib/jvm
          safe_rm /usr/local/lib/jvm
          if [[ -n "${TOOLCACHE_DIR:-}" && "${TOOLCACHE_DIR}" != "/" ]]; then
            safe_rm "${TOOLCACHE_DIR}"/Java*
          fi
          sudo update-alternatives --remove-all java 2>/dev/null || true
          sudo update-alternatives --remove-all javac 2>/dev/null || true
          sudo rm -f /usr/bin/java /usr/bin/javac /etc/alternatives/java /etc/alternatives/javac 2>/dev/null || true
          update_progress "Java removal" "completed"
