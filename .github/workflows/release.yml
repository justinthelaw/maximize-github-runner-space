name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        uses: ./.github/actions/release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main
          skip-github-release: "false"
          skip-github-pull-request: "false"
