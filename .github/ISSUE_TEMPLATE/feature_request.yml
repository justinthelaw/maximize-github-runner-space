name: Feature Request
description: Propose an enhancement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Keep scope and runner impact clear.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Change
      description: What should be added or changed?
    validations:
      required: true

  - type: textarea
    id: safety
    attributes:
      label: Safety Considerations
      description: Any risks to required toolchains or workflow stability
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, examples, or implementation notes
    validations:
      required: false
