name: Release Please

description: Run release-please with repository config and manifest files.

inputs:
  token:
    description: GitHub token used by release-please.
    required: true
  target-branch:
    description: Target branch for release-please.
    required: false
    default: main
  skip-github-release:
    description: Skip GitHub release creation.
    required: false
    default: "false"
  skip-github-pull-request:
    description: Skip release pull request creation.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Run Release Please
      uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
      with:
        token: ${{ inputs.token }}
        config-file: release-please-config.json
        manifest-file: .release-please-manifest.json
        target-branch: ${{ inputs.target-branch }}
        skip-github-release: ${{ inputs.skip-github-release }}
        skip-github-pull-request: ${{ inputs.skip-github-pull-request }}
